<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection Failed</title>

    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f7ff;
        color: #2d2d2d;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .card {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
        max-width: 360px;
        width: 90%;
      }

      .icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        color: #7c3aed;
      }

      p {
        font-size: 14px;
        color: #6b7280;
        margin: 12px 0 25px;
      }

      .btn {
        display: inline-block;
        padding: 12px 20px;
        border-radius: 12px;
        background: #ef4444;
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.2s ease;
      }

      .btn:hover {
        background: #dc2626;
      }

      .secondary {
        display: block;
        margin-top: 12px;
        font-size: 13px;
        color: #7c3aed;
        text-decoration: none;
      }

      .small {
        margin-top: 18px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">❌</div>
      <h1>Connection Failed</h1>
      <p>We couldn’t link your Strava account. Please try again.</p>

      <!-- <a href="myapp://strava-retry" class="btn"> Try Again </a>

      <a href="myapp://home" class="secondary"> Go back to app </a> -->

      <!-- <div class="small">
        If the issue persists, please reconnect from the app.
      </div> -->
    </div>
  </body>
</html>
