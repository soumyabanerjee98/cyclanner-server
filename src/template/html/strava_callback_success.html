<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connected to Strava</title>

    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f7ff;
        color: #2d2d2d;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .card {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
        max-width: 360px;
        width: 90%;
      }

      .icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        color: #6d28d9;
      }

      p {
        font-size: 14px;
        color: #6b7280;
        margin: 12px 0 25px;
      }

      .btn {
        display: inline-block;
        padding: 12px 20px;
        border-radius: 12px;
        background: #7c3aed;
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.2s ease;
      }

      .btn:hover {
        background: #6d28d9;
      }

      .small {
        margin-top: 18px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>

    <!-- <script>
    setTimeout(() => {
      window.location.href = "myapp://strava-success";
    }, 1800);
  </script> -->
  </head>

  <body>
    <div class="card">
      <div class="icon">🔗</div>
      <h1>Strava Connected</h1>
      <p>Your account has been successfully linked.</p>

      <!-- <a href="myapp://strava-success" class="btn"> Open App </a>

      <div class="small">Redirecting automatically...</div> -->
    </div>
  </body>
</html>
